:root {
  --bg: #080c14;
  --accent: #00d4ff;
  --accent2: #ff6b35;
  --text: #e8edf5;
  --muted: #5a6478;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Animated background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(0,212,255,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 80%, rgba(255,107,53,0.06) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

header {
  position: relative;
  z-index: 10;
  padding: 2.5rem 3rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.badge {
  background: linear-gradient(135deg, var(--accent), #0099bb);
  color: #000;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  padding: 0.3rem 0.7rem;
  border-radius: 2px;
  text-transform: uppercase;
}

header h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2rem;
  letter-spacing: 0.08em;
  color: var(--text);
}

header h1 span {
  color: var(--accent);
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent2);
  animation: pulse 2s ease-in-out infinite;
  margin-left: auto;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}

main {
  position: relative;
  z-index: 10;
  max-width: 1100px;
  margin: 0 auto;
  padding: 3rem 2rem 5rem;
}

.intro {
  margin-bottom: 2.5rem;
  animation: fadeUp 0.8s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

.intro h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2.5rem, 6vw, 4.5rem);
  line-height: 1;
  letter-spacing: 0.04em;
  margin-bottom: 1rem;
}

.intro h2 em {
  color: var(--accent);
  font-style: normal;
}

.intro p {
  color: var(--muted);
  font-size: 0.95rem;
  font-weight: 300;
  max-width: 480px;
  line-height: 1.7;
}

.video-wrapper {
  position: relative;
  width: 100%;
  border-radius: 4px;
  overflow: hidden;
  animation: fadeUp 0.8s 0.2s ease both;
  box-shadow:
    0 0 0 1px rgba(0,212,255,0.15),
    0 40px 80px rgba(0,0,0,0.6),
    0 0 60px rgba(0,212,255,0.05);
}

/* Glow border effect */
.video-wrapper::before {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: 5px;
  background: linear-gradient(135deg, rgba(0,212,255,0.4), transparent 40%, rgba(255,107,53,0.3));
  z-index: 1;
  pointer-events: none;
}

.video-wrapper::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 4px;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
  z-index: 2;
  pointer-events: none;
}

.aspect-ratio {
  position: relative;
  padding-top: 56.25%; /* 16:9 */
}

.aspect-ratio iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

.controls-hint {
  margin-top: 1.5rem;
  display: flex;
  gap: 2rem;
  animation: fadeUp 0.8s 0.4s ease both;
  flex-wrap: wrap;
}

.hint-item {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  color: var(--muted);
  font-size: 0.8rem;
  font-weight: 300;
}

.hint-icon {
  width: 32px;
  height: 32px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px;
  display: grid;
  place-items: center;
  font-size: 0.9rem;
  background: rgba(255,255,255,0.03);
}

footer {
  position: relative;
  z-index: 10;
  text-align: center;
  padding: 2rem;
  color: var(--muted);
  font-size: 0.75rem;
  letter-spacing: 0.05em;
  border-top: 1px solid rgba(255,255,255,0.05);
}

footer a {
  color: var(--accent);
  text-decoration: none;
}
